<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="icon" type="image/png" href="icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
	
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
			width: 100vw;
            height: 100vh;
            background-color: rgba(21, 21, 21, 1);
			font-family: sans-serif;
        }

        #custom-alert {
            display: none;
            position: fixed;
            top: 30%;
            background-color: rgba(64, 0, 0, 1);
            color: red;
            padding: 15px;
            z-index: 100;
            border-radius: 10px;
            border: 2px solid red;
			font-size: 1.2vw;
        }
		
		#inputbox {
			color: white;
			position: fixed;
			top: 40%;
			background-color: rgba(0, 100, 255, 1);
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 100;
			border-radius: 10px;
			font-size: 1.3vw;
			transition: background-color .5s, border .5s linear;
			border: 2px solid cyan;
		}
		
		#inputbox:hover {
			background-color: rgba(100, 0, 255, 1);
			border: 2px solid magenta;
		}
		
		#input-container {
			color: white;
			position: fixed;
			width: 100%;
			height: 100%;
			background-color: rgba(100, 0, 0, 0);
			display: flex;
			z-index: 1;
			display: none;
		}
		
    </style>
    <title>Drag & Drop or Paste YouTube Video URL</title>
</head>
	<body onload="isThereUrl()">
	
		<input style="width: 25%; height: 5%;" placeholder=" Drag & Drop or Paste YouTube Video URL" id="inputbox" type="text"/>
		<div id="input-container"></div>
		<div id="custom-alert" class="custom-alert"></div>
		<iframe id="my_frame" style="height: 0%; width: 0%;" src="" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
		<script>
		
			const inputContainer = document.getElementById("input-container");
			const alertBox = document.getElementById("custom-alert");
			const frame = document.getElementById("my_frame");
			const inputbox = document.getElementById("inputbox");
			const url = new URL(window.location);
			const urlParams = url.searchParams;
			
			function Reset() {
				frame.src = '';
				frame.style.height = '0%';
				frame.style.width = '0%';
				inputbox.style.display = 'flex';
				inputContainer.style.display = 'flex';
			}
			
			function showAlert(message, time) {
				alertBox.innerHTML = message;
				alertBox.style.display = 'block';
				setTimeout(() => {
					alertBox.style.display = 'none';
				}, time);
			}
			
			function setTitle(videoId) {
				const apiUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
				fetch(apiUrl)
					.then((response) => {
						if (!response.ok) throw new Error("Failed to fetch video info.");
						return response.json();
					})
					.then((data) => {
						document.title = data.title || "YouTube Video";
					})
					.catch((error) => {
						console.error("Error fetching video title:", error);
						document.title = "Error loading video title";
					});
			}
			
			function EmbedFun(text) {
			
				let videoId = "";
				let embedUrl = "";
				alertBox.style.display = 'none';
				
				if (text.match(/^(https?:\/\/)?(www\.)?google\.com\/url\?/i)) {
					let urlObj = new URL(text);
					let extractedUrl = urlObj.searchParams.get('url');
					if (extractedUrl.includes("youtube.com") || extractedUrl.includes("youtu.be")) EmbedFun(extractedUrl);
					return;
				}
				
				if (text.match(/^(https?:\/\/)?(www\.)?twitch\.tv\/videos\/\d+/i)) {
					let vidId = text.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\/videos\//i, "");
					vidId = vidId.replace(/\?filter=archives\&sort\=time/i, "");
					let popout = 'https://player.twitch.tv/?enableExtensions=true&parent=twitch.tv&player=popout&quality=720p&video=' + vidId;
					window.open(popout, '_blank');
					return;
				}
				
				if (text.match(/^(https?:\/\/)?(www\.)?twitch\.tv\/\w+$/i)) {
					let ChId = text.replace(/^(https?:\/\/)?(www\.)?twitch\.tv\//i, "");;
					let popout = 'https://player.twitch.tv/?channel=' + ChId + '&enableExtensions=true&muted=false&parent=twitch.tv&player=popout&quality=360p30&volume=0.1'
					window.open(popout, '_blank');
					return;
				}
				
				if (text.includes("holodex.net/watch/")) {
					text = text.replace(/holodex\.net\/watch/i, "youtu.be");
				}
				
				if (text.includes("youtube.com/embed/")) {
					text = text.replace(/www\./i, "");
					videoId = text.split("youtube.com/embed/")[1];
					embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
				}
				
				if (text.includes("watch?v=")) {
					videoId = text.split("v=")[1].split("&")[0];
					embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
				}
				
				if (text.includes("youtu.be/")) {
					videoId = text.split("youtu.be/")[1];
					embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
				}
				
				if (text.includes("youtube.com/live/")) {
					videoId = text.split("youtube.com/live/")[1];
					embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
				}
				
				if (text.includes("playlist?list=")) {
					embedUrl = text.replace(/(www\.)?youtube(-nocookie)?\.com\/playlist\?list=/i, "www.youtube.com/embed/playlist?list=");
					let playlistID = text.replace(/(https?:\/\/)?(www\.)?youtube(-nocookie)?\.com\/playlist\?list=/i, "");
					apiUrl = `https://www.youtube.com/oembed?url=https://www.youtube.com/playlist?list=${playlistID}&format=json`;
					fetch(apiUrl)
						.then((response) => {
							if (!response.ok) throw new Error("Failed to fetch video info.");
							return response.json();
						})
						.then((data) => {
							document.title = data.title || "YouTube Video";
						})
						.catch((error) => {
							console.error("Error fetching video title:", error);
							document.title = "Error loading video title";
					});
				}
				
				if (embedUrl) {
					frame.src = embedUrl;
					frame.style.height = '95%';
					frame.style.width = '95%';
					inputbox.style.display = 'none';
					inputContainer.style.display = 'none';
					urlParams.delete("url");
					window.history.pushState({}, "", url + "?url=" + embedUrl);
				} else {
					showAlert("Could not embed the video. Please check the link.", 3000);
					console.log("ERROR REPORT\nembedUrl: " + embedUrl + "\nvideoId: " + videoId + "\ntext: " + text);
				}
				
				if (videoId) setTitle(videoId);
			}
			
			function isEmbeded() {
				const youtubeRegex = /youtube\.com\/embed\//i;
				return youtubeRegex.test(frame.src);
			}
			
			function isThereUrl() {
				if (urlParams.has('url')) {
					setTimeout(() => {
						EmbedFun(urlParams.get('url'));
					}, 1000);
				}
			}
			
			function StepOne(one) {
				let data = one.trim();
				EmbedFun(data);
				inputContainer.style.display = 'none';
			}
			
			document.addEventListener("dragenter", () => {
				event.preventDefault()
			});
			
			document.addEventListener("dragover", (event) => {
				event.preventDefault();
				inputContainer.style.display = 'flex';
			});
			
			document.addEventListener("dragleave", (event) => {
				event.preventDefault();
				inputContainer.style.display = 'none';
			});
			
			document.addEventListener("drop", (event) => {
				event.preventDefault();
				const data = event.dataTransfer.getData("text");
				StepOne(data);
			});
			
			document.addEventListener("paste", (event) => {
				event.preventDefault();
				const clipboardContent = event.clipboardData.getData("text");
				StepOne(clipboardContent);
			});
			
			let holdTimeout;
			
			document.addEventListener('mousedown', (event) => {
				holdTimeout = setTimeout(() => { Reset(); }, 500);
			});
			
			document.addEventListener('mouseup', () => {
				clearTimeout(holdTimeout);
			});
			
		</script>
	</body>
</html>
